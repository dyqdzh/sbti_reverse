<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SBTI 反向指南 & 人格百科</title>
  <style>
    /* ── Night palette — blue tones ── */
    :root {
      --bg:           #0c1018;
      --panel:        #131624;
      --panel2:       #1a2038;
      --text:         #c8d4ec;
      --muted:        #526080;
      --line:         #1e2840;
      --soft:         #141828;
      --accent:       #6a9fd8;
      --accent-s:     #9bbef5;
      --shadow:       0 16px 40px rgba(0,0,0,.55);
      --radius:       22px;
      --tag-l-bg:     #0e1e30; --tag-l-t: #60a8e8;
      --tag-m-bg:     #1e1800; --tag-m-t: #d4a830;
      --tag-h-bg:     #200e38; --tag-h-t: #c080f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #0f1420 0, #0c1018 40%, #090e18 100%);
      color: var(--text);
      min-height: 100vh;
    }

    h1,h2,h3,h4,p { margin:0; }
    button { border:0; cursor:pointer; font:inherit; transition:transform .16s, box-shadow .16s, opacity .16s; }
    button:hover { transform:translateY(-1px); }

    .shell { max-width: 1000px; margin: 0 auto; padding: 24px 16px 64px; }

    /* ── Card ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ── Eyebrow badge ── */
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--accent-s);
      border: 1px solid var(--line); background: var(--soft);
      border-radius: 999px; padding: 8px 14px; margin-bottom: 16px;
    }

    /* ── Hero ── */
    .hero {
      padding: 32px 28px 28px; margin-top: 20px;
      overflow: hidden; position: relative;
    }
    .hero::after {
      content:""; position:absolute; right:-60px; top:-60px;
      width:200px; height:200px; border-radius:50%;
      background: radial-gradient(circle, rgba(106,159,216,.13), transparent 70%);
      pointer-events:none;
    }
    .hero h1 {
      font-size: clamp(26px,5vw,48px);
      line-height: 1.1; letter-spacing: -.03em;
      color: var(--accent-s);
    }
    .hero .sub {
      margin-top: 12px; color: var(--muted);
      font-size: 15px; line-height: 1.75; max-width: 680px;
    }
    .hero-actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:22px; }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--accent); color: #090e18;
      padding: 12px 22px; border-radius: 14px; font-weight: 700; font-size:14px;
      box-shadow: 0 8px 24px rgba(106,159,216,.28);
    }
    .btn-secondary {
      background: var(--panel2); color: var(--accent-s);
      padding: 12px 22px; border-radius: 14px; font-weight: 700; font-size:14px;
      border: 1px solid var(--line);
    }
    .btn-primary.active, .btn-secondary.active-tab {
      background: var(--accent); color: #090e18;
      box-shadow: 0 8px 24px rgba(106,159,216,.32);
    }

    /* ── Tab pills ── */
    .tab-wrap {
      display: inline-flex; gap: 8px;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 999px; padding: 5px; margin-bottom: 28px;
    }
    .tab-btn {
      padding: 9px 22px; border-radius: 999px;
      background: transparent; color: var(--muted); font-weight: 700; font-size: 14px;
      transition: all .18s;
    }
    .tab-btn.active {
      background: var(--accent); color: #090e18;
      box-shadow: 0 6px 18px rgba(106,159,216,.30);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .section { display:none; }
    .section.active { display:block; }

    /* ══════════════════════════════
       GUIDE — personality selector
    ══════════════════════════════ */
    .type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px,1fr));
      gap: 10px; margin-bottom: 24px;
    }
    .type-card {
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid var(--line); border-radius: 16px;
      padding: 16px 10px 14px; cursor:pointer; text-align:center;
      transition: border-color .18s, transform .18s, box-shadow .18s;
      user-select:none;
    }
    .type-card:hover {
      border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(106,159,216,.20);
    }
    .type-card.selected {
      border-color: var(--accent); background: var(--soft);
      box-shadow: 0 0 0 3px rgba(106,159,216,.20);
    }
    .type-card.drunk-card { border-color: #3a2800; }
    .type-card.drunk-card:hover, .type-card.drunk-card.selected { border-color: #d4a830; }
    .type-card.hhhh-card { border-color: #1a1040; }
    .type-card.hhhh-card:hover, .type-card.hhhh-card.selected { border-color: #7a60f0; }
    .tc-code { font-size: 1rem; font-weight: 800; color: var(--accent-s); word-break:break-all; }
    .tc-cn   { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ══════════════════════════════
       ADVICE PANEL
    ══════════════════════════════ */
    #advice-panel { display:none; }
    .adv-card { margin-top: 4px; }

    /* Head */
    .adv-head {
      display: grid; grid-template-columns: auto 1fr; gap: 22px;
      align-items: start; padding: 24px 26px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #141828, #0e1220);
      border-radius: var(--radius) var(--radius) 0 0;
      position:relative; overflow:hidden;
    }
    .adv-head::after {
      content:""; position:absolute; right:-40px; top:-40px;
      width:160px; height:160px; border-radius:50%;
      background: radial-gradient(circle, rgba(106,159,216,.10), transparent 70%);
      pointer-events:none;
    }
    .adv-img {
      width: 90px; height: 90px; border-radius: 14px;
      object-fit: cover; border: 1px solid var(--line); flex-shrink:0;
    }
    .adv-code { font-size: 2rem; font-weight: 900; color: var(--accent-s); letter-spacing:-.02em; }
    .adv-cn   { font-size: 1.05rem; color: var(--text); margin-top: 4px; }
    .adv-intro { font-size: 13px; color: var(--accent); font-style:italic; margin-top: 6px; }
    .adv-pattern {
      display:inline-block; margin-top: 10px;
      font-family: monospace; font-size: 12px; color: var(--muted);
      background: var(--bg); padding: 4px 12px; border-radius: 8px;
      border: 1px solid var(--line);
    }

    /* Body */
    .adv-body { padding: 22px 26px; }
    .sec-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px;
    }

    /* Score overview — 5-column mini panels */
    .score-grid {
      display: grid; grid-template-columns: repeat(5,1fr); gap: 10px;
      margin-bottom: 28px;
    }
    .model-block {
      background: var(--bg); border: 1px solid var(--line);
      border-radius: 16px; padding: 14px 12px;
    }
    .model-name { font-size: 11px; color: var(--muted); font-weight:700; margin-bottom:10px; }
    .dim-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
    .dim-label { font-size: 12px; color: var(--text); }
    .lvl-tag {
      padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 800;
    }
    .lvl-L { background:var(--tag-l-bg); color:var(--tag-l-t); }
    .lvl-M { background:var(--tag-m-bg); color:var(--tag-m-t); }
    .lvl-H { background:var(--tag-h-bg); color:var(--tag-h-t); }

    /* Per-dim groups */
    .dim-groups { display:flex; flex-direction:column; gap:14px; }
    .dim-grp {
      border: 1px solid var(--line); border-radius: 18px; overflow:hidden;
      background: linear-gradient(180deg, var(--panel2), var(--panel));
    }
    .dim-grp-head {
      display:flex; align-items:center; gap:10px; padding:12px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #141828, var(--panel));
    }
    .dgh-name  { font-weight:700; font-size:13px; flex:1; }
    .dgh-score { font-size:11px; color:var(--muted); }

    /* Question advice rows (styled like original .option) */
    .q-rows { padding:12px; display:flex; flex-direction:column; gap:8px; }
    .q-row {
      display:flex; align-items:flex-start; gap:12px;
      padding: 13px 14px; border-radius:14px;
      border: 1px solid var(--line); background: var(--bg);
      transition: border-color .15s, background .15s;
    }
    .q-row:hover { border-color: #2a3a60; background: #0d1228; }
    .q-num {
      font-weight:800; font-size:12px; color:var(--accent);
      min-width:28px; padding-top:2px; flex-shrink:0;
    }
    .q-body { flex:1; }
    .q-text { font-size:12.5px; color:var(--muted); line-height:1.6; margin-bottom:8px; }
    .q-ans-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .q-ans-letter {
      background: var(--accent); color: #090e18;
      padding: 3px 12px; border-radius: 8px; font-weight:800; font-size:13px;
    }
    .q-ans-text { font-size:13px; color:var(--text); font-weight:600; }

    /* Special box */
    .sp-box {
      border-radius: 18px; padding: 20px; margin-bottom: 0;
    }
    .sp-box.drunk { background:#100a00; border:1px solid #3a2800; }
    .sp-box.hhhh  { background:#0e0820; border:1px solid #2a1a60; }
    .sp-box h4    { font-size:15px; margin-bottom:10px; }
    .sp-box.drunk h4 { color:#d4a830; }
    .sp-box.hhhh  h4 { color:#9d8fff; }
    .sp-box p   { font-size:13px; color:var(--muted); line-height:1.8; }
    .sp-step {
      padding:10px 14px; border-radius:12px; margin-top:10px;
      font-size:13px; line-height:1.7;
    }
    .sp-step.drunk { background:#1a1200; color:var(--text); border:1px solid #3a2800; }
    .sp-step.hhhh  { background:#150e28; color:var(--text); border:1px solid #2a1a60; }
    .sp-note {
      margin-top:18px; padding:14px 18px; border-radius:14px;
      background:var(--bg); border:1px solid var(--line); font-size:12px; color:var(--muted);
    }

    /* ══════════════════════════════
       WIKI
    ══════════════════════════════ */
    .wiki-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px;
    }
    .wiki-card {
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border:1px solid var(--line); border-radius:var(--radius);
      overflow:hidden; transition:transform .2s, box-shadow .2s;
    }
    .wiki-card:hover { transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,.5); }

    .wiki-img-wrap { width:100%; position:relative; background:var(--bg); }
    .wiki-img { width:100%; height:auto; display:block; }
    .wiki-img-overlay { display:none; }

    .wiki-body { padding:18px; }
    .wc-top { display:flex; align-items:baseline; gap:10px; margin-bottom:8px; }
    .wc-code { font-size:1.5rem; font-weight:900; color:var(--accent-s); letter-spacing:-.02em; }
    .wc-cn   { font-size:14px; color:var(--muted); }
    .wc-intro {
      font-style:italic; font-size:13px; color:var(--accent);
      border-left:3px solid var(--accent); padding-left:10px; margin-bottom:12px;
    }
    .wc-desc {
      font-size:13px; color:var(--text); line-height:1.8;
      max-height:108px; overflow:hidden; position:relative;
      transition: max-height .3s ease;
    }
    .wc-desc.expanded { max-height:1200px; }
    .wc-desc:not(.expanded)::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:40px;
      background:linear-gradient(transparent, var(--panel));
    }
    .wc-expand {
      margin-top:8px; font-size:12px; color:var(--accent);
      background:none; border:none; padding:0; cursor:pointer; display:block;
    }
    .wc-expand:hover { color:var(--accent-s); }
    .wc-pattern {
      margin-top:12px; font-family:monospace; font-size:11px; color:var(--muted);
      background:var(--bg); padding:5px 12px; border-radius:8px;
      border:1px solid var(--line); display:inline-block;
    }
    .wc-pattern.sp-pattern { color:#d4a830; background:#100a00; border-color:#3a2800; }
    .wiki-card.wiki-drunk .wc-code { color:#d4a830; }
    .wiki-card.wiki-hhhh  .wc-code { color:#9d8fff; }

    /* ── Responsive ── */
    @media(max-width:700px){
      .score-grid { grid-template-columns:1fr 1fr; }
      .type-grid  { grid-template-columns:repeat(4,1fr); }
      .wiki-grid  { grid-template-columns:1fr; }
      .adv-head   { grid-template-columns:1fr; }
      .adv-img    { width:72px; height:72px; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Hero -->
  <div class="card hero" style="margin-top:20px;">
    <span class="eyebrow">🌙 SBTI 反向指南</span>
    <h1>知道目标，<br>才知道怎么答题。</h1>
    <p class="sub">选择你想测出的人格，系统会逐题告诉你应该选哪个选项，以及对应的维度分数目标。</p>
    <div class="hero-actions">
      <div class="tab-wrap">
        <button class="tab-btn active" onclick="switchTab('guide')">🎯 反向指南</button>
        <button class="tab-btn" onclick="switchTab('wiki')">📖 人格百科</button>
      </div>
    </div>
  </div>

  <div style="margin-top:24px;">

    <!-- ── GUIDE ── -->
    <div id="guide" class="section active">
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">
        共 27 种人格 · 点击卡片获取逐题作答建议 ↓
      </p>
      <div class="type-grid" id="guide-grid"></div>
      <div id="advice-panel"></div>
    </div>

    <!-- ── WIKI ── -->
    <div id="wiki" class="section">
      <div class="wiki-grid" id="wiki-grid"></div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════

const QUESTIONS = [
  {id:'q1', dim:'S1', num:1,
   text:'我不仅是屌丝，我还是joker，我还是咸鱼，这辈子没谈过一场恋爱，胆怯又自卑……求求哥们给我们这种小丑一点活路吧，我真的不想在白天把枕巾哭湿一大片',
   options:[{label:'我哭了。。',value:1},{label:'这是什么。。',value:2},{label:'这不是我！',value:3}]},
  {id:'q2', dim:'S1', num:2,
   text:'我不够好，周围的人都比我优秀',
   options:[{label:'确实',value:1},{label:'有时',value:2},{label:'不是',value:3}]},
  {id:'q3', dim:'S2', num:3,
   text:'我很清楚真正的自己是什么样的',
   options:[{label:'不认同',value:1},{label:'中立',value:2},{label:'认同',value:3}]},
  {id:'q4', dim:'S2', num:4,
   text:'我内心有真正追求的东西',

  {id:'q5', dim:'S3', num:5,

   text:'外人的评价对我来说无所吊谓。',
   options:[{label:'不认同',value:1},{label:'中立',value:2},{label:'认同',value:3}]},
  {id:'q7', dim:'E1', num:7,

  {id:'q18', dim:'A3', num:18,

  {id:'q23', dim:'Ac3', num:23,
   text:'别人说你"执行力强"，你内心更接近哪句？',

  'JOKE-R':{cn:'小丑',intro:'原来我们都是小丑。',desc:'请注意，JOKE-R人格不是一个"人"，更像一个把笑话穿在身上的小丑。你打开一层，是个笑话；再打开一层，是个段子；你一层层打开，直到最后，你发现最里面……是空的，只剩下一点微弱的回声在说：哈，没想到吧。JOKE-R是社交场合的气氛组组长兼唯一指定火力输出。所有人前仰后合地笑着，而笑得最开心的往往也是他们自己——用最大的笑声，盖住心碎的声音。'},
  'WOC!':{cn:'握草人',intro:'卧槽，我怎么是这个人格？',desc:'我们发现了一种神奇的生物——WOC!人。他们拥有两种完全独立的操作系统：一个叫"表面系统"，负责发出"我操""牛逼""啊？"等一系列大惊小怪的拟声词；另一个叫"后台系统"，负责冷静分析：嗯，果然不出我所料。WOC!人深知，给傻逼讲道理，就像扶着烂泥上墙，不仅浪费体力，还弄自己一手屎。'},
  'THIN-K':{cn:'思考者',intro:'已深度思考100s。',desc:'经研究发现，THIN-K人格的大脑构造与常人有根本性不同。正如名称所示，您的大脑长时间处于思考状态。您十分会审判信息，注重论点、论据、逻辑推理、潜在偏见，乃至"作者本人三代以内思想背景调查报告"的全套材料。当别人看到您独处时在发呆？愚蠢，那不是发呆，那是您的大脑正在对今天接收到的所有信息进行分类、归档和销毁。'},

  MONK:{cn:'僧人',intro:'没有那种世俗的欲望。',desc:'当别人在KTV里参悟爱与恨的纠缠，MONK人格选择在家中参悟一份大道。MONK已然看破红尘，不希望闲人来扰其清修、破其道行。MONK的个人空间，是他们的结界，是他们的须弥山，神圣不可侵犯。MONK们不黏不缠，因为在他们的世界观里，行星与行星之间保持着亿万公里的距离，才构成和谐宇宙，人与人之间为什么不行？'},
  IMSB:{cn:'傻者',intro:'认真的么？我真的是傻逼么？',desc:'恭喜您！您根本不在人类范畴内！您测出了百万年一遇的【IMSB】人格。IMSB人格的大脑里住着两个不死不休的究极战士：一个叫"我他妈冲了！"，另一个叫"我是个傻逼！"。当IMSB面对一个有好感的人时，前者说：冲啊！后者接着说：人家凭什么看得上你？最终结果：盯着对方背影直到消失，然后掏出手机搜索"如何克服社交恐惧症"。'},
  SOLO:{cn:'孤儿',intro:'我哭了，我怎么会是孤儿？',desc:'恭喜您，您测出了全中国最稀有的【SOLO - 孤儿】人格。别急着哭，国王的加冕仪式，通常都是一个人。孤儿的自我价值感偏低，因此有时主动疏远他人，在自己的灵魂外围建起了一座名为"莫挨老子"的万里长城。孤儿就像一只把所有软肋都藏起来，然后用最硬的刺对着世界的刺猬。那满身的尖刺不是攻击，那是一句句说不出口的"别过来，我怕你也受伤"。'},
  FUCK:{cn:'草者',intro:'操！这是什么人格？',desc:'恭喜您！您根本不在人类范畴内！您测出了百万年一遇的【FUCK】人格。人类文明城市里，出现了一株无法被任何除草剂杀死的、具有超级生命力的人形野草——那就是草者人格。在FUCK的世界观里，世俗规则简直毫无意义，并且FUCK的情绪开关是物理拨片式的：FUCK YEAH 和 FUCK OFF。当所有人都被驯化成了温顺家禽，FUCK则是荒野上最后那一声狼嚎。'},
  DEAD:{cn:'死者',intro:'我，还活着吗？',desc:'恭喜您，您测出了全中国最为罕见的人格，只是"死者"这个名字实在有点晦气，所以也可以叫：Don\'t Expect Any Drives。死者已经看透了那些无意义的哲学思考，因此显得对一切"失去"了兴趣。死者们看世界的眼神，就像一位顶级玩家通关了所有主线、支线、隐藏任务，删档重开了999次之后，终于发现：这游戏压根就没意思。死者是超越了欲望和目标的终极贤者。'},
  IMFW:{cn:'废物',intro:'我真的...是废物吗？',desc:'恭喜您，您测出的不是一个普通人格，您是一种极其珍稀的——【废物】。废物们的自尊通常有些脆弱，缺乏安全感，偶尔也会缺乏主见，因此能精确地感知到周围最强的那个WiFi信号——也就是他们心里最可靠的人。走进【废物】人格的生活，就像走进了一个顶级兰花温室：需要精确控制温度、湿度。给废物一颗糖，他们会还你一个完全信任你、亮晶晶的眼神。'},
  HHHH:{cn:'傻乐者',intro:'哈哈哈哈哈哈。',desc:'恭喜您！由于您的思维回路过于清奇，标准人格库已全面崩溃。第一人格匹配率只有60%以下时，系统才会为您强制匹配这个人格——【HHHH - 傻乐者】。这个人格有什么特质？哈哈哈哈哈哈哈哈哈哈哈哈！对不起，这就是全部的特质了。怎么会有人的脑回路这么新奇。'},
  DRUNK:{cn:'酒鬼',intro:'烈酒烧喉，不得不醉。',desc:'您为什么走路摇摇晃晃？您为什么总是情绪高涨？因为您体内流淌的不是血液，是美味的五粮液！是国窖1573！是江小白！您是否已经习惯了将白酒灌入保温杯，当作白开水一饮而下？多么伟大的白酒！它让您在饭桌上谈笑风生，在厕所里抱着马桶忏悔人生；直到第二天上午十点，您的头像裂开的核桃，嘴角挂着食物残渣，灵魂缩在角落里。'},
};

const TYPE_IMGS = {
  CTRL:'./image/CTRL.png', 'ATM-er':'./image/ATM-er.png', 'Dior-s':'./image/Dior-s.jpg',
  BOSS:'./image/BOSS.png', 'THAN-K':'./image/THAN-K.png', 'OH-NO':'./image/OH-NO.png',
  GOGO:'./image/GOGO.png', SEXY:'./image/SEXY.png', 'LOVE-R':'./image/LOVE-R.png',
  MUM:'./image/MUM.png', FAKE:'./image/FAKE.png', OJBK:'./image/OJBK.png',
  MALO:'./image/MALO.png', 'JOKE-R':'./image/JOKE-R.jpg', 'WOC!':'./image/WOC.png',
  'THIN-K':'./image/THIN-K.png', SHIT:'./image/SHIT.png', ZZZZ:'./image/ZZZZ.png',
  POOR:'./image/POOR.png', MONK:'./image/MONK.png', IMSB:'./image/IMSB.png',
  SOLO:'./image/SOLO.png', FUCK:'./image/FUCK.png', DEAD:'./image/DEAD.png',
  IMFW:'./image/IMFW.png', HHHH:'./image/HHHH.png', DRUNK:'./image/DRUNK.png',
};

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════

function parsePattern(pat) {
  const chars = pat.replace(/-/g,'');
  const r = {};
  DIM_ORDER.forEach((d,i) => r[d] = chars[i]);
  return r;
}
function getQ(id) { return QUESTIONS.find(q => q.id === id); }
function optForLevel(q, lv) {
  const v = lv==='L'?1 : lv==='M'?2 : 3;
  return q.options.find(o => o.value === v);
}
function optLetter(q, opt) { return ['A','B','C'][q.options.indexOf(opt)] ?? '?'; }
function trunc(s, n) { return s.length > n ? s.slice(0,n)+'…' : s; }
function safe(code) { return code.replace(/[^a-zA-Z0-9]/g,'-'); }

// ═══════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[tab==='guide'?0:1].classList.add('active');
}

// ═══════════════════════════════════════════════
//  GUIDE GRID
// ═══════════════════════════════════════════════
let selCode = null;

function buildGuideGrid() {
  const all = [...NORMAL_TYPES.map(t=>t.code), 'HHHH', 'DRUNK'];
  document.getElementById('guide-grid').innerHTML = all.map(code => {
    const lib = TYPE_LIB[code];
    const extra = code==='DRUNK' ? ' drunk-card' : code==='HHHH' ? ' hhhh-card' : '';
    return `<div class="type-card${extra}" id="gc-${safe(code)}" onclick="pickType('${code}')">
      <div class="tc-code">${code}</div>
      <div class="tc-cn">${lib.cn}</div>
    </div>`;
  }).join('');
}

function pickType(code) {
  if (selCode) {
    const prev = document.getElementById('gc-'+safe(selCode));
    if (prev) prev.classList.remove('selected');
  }
  selCode = code;
  const card = document.getElementById('gc-'+safe(code));
  if (card) card.classList.add('selected');
  renderAdvice(code);
  document.getElementById('advice-panel').style.display = 'block';
  setTimeout(()=>document.getElementById('advice-panel').scrollIntoView({behavior:'smooth',block:'start'}), 60);
}

// ═══════════════════════════════════════════════
//  ADVICE PANEL
// ═══════════════════════════════════════════════
function imgTag(code, cls='adv-img') {
  return `<img class="${cls}" src="${TYPE_IMGS[code]}" alt="${code}">`;
}

function renderAdvice(code) {
  const panel = document.getElementById('advice-panel');
  const lib = TYPE_LIB[code];

  // ── DRUNK ──
  if (code === 'DRUNK') {
    panel.innerHTML = `<div class="card adv-card">
      <div class="adv-head">
        ${imgTag(code)}
        <div>
          <div class="adv-code">${code}</div>
          <div class="adv-cn">${lib.cn}</div>
          <div class="adv-intro">${lib.intro}</div>
        </div>
      </div>
      <div class="adv-body">
        <div class="sp-box drunk">
          <h4>🍶 如何触发 DRUNK 人格</h4>
          <p>DRUNK 是隐藏彩蛋人格，<strong style="color:#d4a830">与30道正题的答案完全无关</strong>，只需在特殊题中这样选：</p>
          <div class="sp-step drunk">第一步：在特殊题「您平时有什么爱好？」中选 <strong style="color:#d4a830">C — 饮酒</strong></div>
          <div class="sp-step drunk">第二步：在随即出现的「您对饮酒的态度是？」中选 <strong style="color:#d4a830">B — 我习惯将白酒灌在保温杯，当白开水喝，酒精令我信服。</strong></div>
          <div class="sp-step drunk" style="color:var(--muted)">✓ 完成以上两步，系统直接强制输出 DRUNK，忽略所有其他分数。30道正题随便答即可。</div>
        </div>
      </div>
    </div>`;
    return;
  }

  // ── HHHH ──
  if (code === 'HHHH') {
    panel.innerHTML = `<div class="card adv-card">
      <div class="adv-head">
        ${imgTag(code)}
        <div>
          <div class="adv-code">${code}</div>
          <div class="adv-cn">${lib.cn}</div>
          <div class="adv-intro">${lib.intro}</div>
        </div>
      </div>
      <div class="adv-body">
        <div class="sp-box hhhh">
          <h4>😂 关于 HHHH 傻乐者</h4>
          <p>HHHH 是<strong style="color:#9d8fff">兜底人格</strong>，当你的答案组合与25种标准人格的最高匹配相似度低于60%时触发。无法精确锁定，但可参考以下思路：</p>
          <div class="sp-step hhhh">尝试在不同维度混合高低分，使得结果既不偏向高分也不偏向低分，让25种标准人格都无法高度匹配。</div>
          <div class="sp-step hhhh">注意：<strong>不要</strong>在特殊题选"饮酒→保温杯"，否则会触发 DRUNK 而非 HHHH。</div>
          <div class="sp-step hhhh" style="color:var(--muted)">提示：全选B（中立）并不能触发HHHH，因为OJBK等人格会高度匹配。建议随机尝试几次。</div>
        </div>
      </div>
    </div>`;
    return;
  }

  // ── Normal type ──
  const typeData = NORMAL_TYPES.find(t => t.code === code);
  const levels = parsePattern(typeData.pattern);

  // Score overview
  const scoreGridHtml = Object.entries(MODELS).map(([mname, dims]) => {
    const rows = dims.map(dim => {
      const lv = levels[dim];
      return `<div class="dim-row">
        <span class="dim-label">${DIM_NAMES[dim]}</span>
        <span class="lvl-tag lvl-${lv}">${lv}</span>
      </div>`;
    }).join('');
    return `<div class="model-block"><div class="model-name">${mname}</div>${rows}</div>`;
  }).join('');

  // Per-dim advice
  const dimGroupsHtml = DIM_ORDER.map(dim => {
    const lv = levels[dim];
    const score = lv==='L'?'2分（≤3）' : lv==='M'?'4分（=4）' : '6分（≥5）';
    const qIds = DIM_Q[dim];
    const qRowsHtml = qIds.map(qId => {
      const q = getQ(qId);
      const opt = optForLevel(q, lv);
      const letter = optLetter(q, opt);
      return `<div class="q-row">
        <div class="q-num">Q${q.num}</div>
        <div class="q-body">
          <div class="q-text">${trunc(q.text, 65)}</div>
          <div class="q-ans-row">
            <span class="q-ans-letter">${letter}</span>
            <span class="q-ans-text">${opt ? trunc(opt.label, 30) : '—'}</span>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="dim-grp">
      <div class="dim-grp-head">
        <span class="dgh-name">${DIM_NAMES[dim]}</span>
        <span class="lvl-tag lvl-${lv}">${lv}</span>
        <span class="dgh-score">目标 ${score}</span>
      </div>
      <div class="q-rows">${qRowsHtml}</div>
    </div>`;
  }).join('');

  panel.innerHTML = `<div class="card adv-card">
    <div class="adv-head">
      ${imgTag(code)}
      <div>
        <div class="adv-code">${code}</div>
        <div class="adv-cn">${lib.cn}</div>
        <div class="adv-intro">${lib.intro}</div>
        <div class="adv-pattern">${typeData.pattern}</div>
      </div>
    </div>
    <div class="adv-body">
      <div class="sec-label">各维度目标等级</div>
      <div class="score-grid">${scoreGridHtml}</div>
      <div class="sec-label" style="margin-bottom:14px">逐题作答建议（两题均按推荐选项作答即可精准命中该维度等级）</div>
      <div class="dim-groups">${dimGroupsHtml}</div>
      <div class="sp-note">
        📌 <strong>特殊题提示：</strong>「您平时有什么爱好？」选 A（吃喝拉撒）、B（艺术爱好）或 D（健身），<strong>不要选 C（饮酒）</strong>，否则会触发酒鬼分支影响结果。
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  WIKI
// ═══════════════════════════════════════════════
function buildWiki() {
  const all = [...NORMAL_TYPES.map(t=>t.code), 'HHHH', 'DRUNK'];
  document.getElementById('wiki-grid').innerHTML = all.map(code => {
    const lib = TYPE_LIB[code];
    const typeData = NORMAL_TYPES.find(t=>t.code===code);
    const patternHtml = typeData
      ? `<div class="wc-pattern">${typeData.pattern}</div>`
      : `<div class="wc-pattern sp-pattern">${code==='DRUNK'?'彩蛋：特殊题触发':'兜底：匹配度 < 60%'}</div>`;
    const extra = code==='DRUNK' ? ' wiki-drunk' : code==='HHHH' ? ' wiki-hhhh' : '';
    const descId = 'wd-'+safe(code);
    const btnId  = 'wb-'+safe(code);
    return `<div class="wiki-card${extra}">
      <div class="wiki-img-wrap">
        <img class="wiki-img" src="${TYPE_IMGS[code]}" alt="${code}">
        <div class="wiki-img-overlay"></div>
      </div>
      <div class="wiki-body">
        <div class="wc-top">
          <span class="wc-code">${code}</span>
          <span class="wc-cn">${lib.cn}</span>
        </div>
        <div class="wc-intro">${lib.intro}</div>
        <div class="wc-desc" id="${descId}">${lib.desc}</div>
        <button class="wc-expand" id="${btnId}" onclick="toggleDesc('${descId}','${btnId}')">展开全文 ↓</button>
        ${patternHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleDesc(descId, btnId) {
  const el = document.getElementById(descId);
  const btn = document.getElementById(btnId);
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '收起 ↑' : '展开全文 ↓';
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildGuideGrid();
buildWiki();
</script>
